backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "aplikasi"
    label: "Daftar Aplikasi"
    folder: "src/content/aplikasi"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Judul Aplikasi", name: "title", widget: "string" }
      - { label: "Kategori", name: "kategori", widget: "string", hint: "Misal: Utility" }
      - { label: "Sistem Operasi", name: "os", widget: "string", default: "Windows" }
      - { label: "Ukuran File", name: "ukuran", widget: "string", hint: "Misal: 60 MB" }
      - { label: "Gambar Utama / Ikon", name: "gambar", widget: "image", required: false }
      
      # --- AMUNISI SEO ---
      - { label: "Ringkasan (SEO Meta Description)", name: "ringkasan", widget: "text", hint: "Maksimal 2 kalimat untuk muncul di pencarian Google." }
      
      # --- KOLOM DAGING ARTIKEL (YANG TADI HILANG) ---
      - { label: "Isi Artikel Lengkap", name: "body", widget: "markdown", hint: "Tulis semua penjelasan, fitur, spesifikasi, dan cara install di sini." }

      # --- MESIN UANG (SAFELINK) ---
      - label: "Daftar Link Download"
        name: "daftar_download"
        widget: "list"
        required: false
        fields:
          - { label: "Nama Tombol", name: "nama", widget: "string", hint: "Misal: Download Via Telegram" }
          - { label: "Link URL", name: "link", widget: "string", hint: "Gunakan format Safelink: /download?url=https://..." }